<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ========================================
       BASIC SETTINGS
  ========================================= -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluir | Avatar Editor</title>

  <!-- ========================================
       FONTS
  ========================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- ========================================
       ICONS
  ========================================= -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- ========================================
       CSS
  ========================================= -->
  <link rel="stylesheet" href="css/avatar-editor.css" />
</head>
<body>
  <div class="avatar-editor-page">
    <!-- ========================================
         SIDEBAR
    ========================================= -->
    <aside class="editor-sidebar">
      <div class="brand-area">
        <div class="brand-mark" aria-hidden="true">
          <span class="brand-sun"></span>
          <span class="brand-wave brand-wave-1"></span>
          <span class="brand-wave brand-wave-2"></span>
        </div>
        <h1>Fluir</h1>
      </div>

      <nav class="editor-nav">
        <a href="home.html" class="nav-link">
          <i class="bi bi-house-door"></i>
          <span>Home</span>
        </a>

        <a href="profile.html" class="nav-link active">
          <i class="bi bi-person"></i>
          <span>Profile</span>
        </a>
      </nav>
    </aside>

    <!-- ========================================
     MAIN CONTENT
======================================== -->
<main class="editor-main">
  <header class="editor-header">
    <div>
      <p class="eyebrow">Editor de foto de perfil</p>
      <h2>Editar bonequinho</h2>
    </div>

        <div class="header-actions">
          <button type="button" class="secondary-btn" id="backToProfileBtn">
  <i class="bi bi-arrow-left"></i>
  Voltar para o perfil
</button>
        </div>
      </header>

      <section class="editor-layout">
        <!-- ========================================
             PREVIEW CARD
        ========================================= -->
        <article class="preview-card">
          <div class="avatar-preview-frame">
            <div class="avatar-stack" id="avatarStack">
              <img id="layerBase" alt="" />
              <img id="layerSkin" alt="" />
              <img id="layerEarLeft" alt="" />
              <img id="layerEarRight" alt="" />
              <img id="layerEyeLeft" alt="" />
              <img id="layerEyeRight" alt="" />
              <img id="layerNose" alt="" />
              <img id="layerMouth" alt="" />
              <img id="layerHair" alt="" />
              <img id="layerShirt" alt="" />
            </div>
          </div>

          <p class="preview-helper-text">
  Monte seu bonequinho do seu jeito e salve como sua foto de perfil.
</p>

          <div class="preview-actions">
            <button type="button" class="secondary-btn" id="randomAvatarBtn">
  Aleatório
</button>

<button type="button" class="primary-btn" id="saveAvatarBtn">
  Salvar foto de perfil
</button>
          </div>

          <div id="avatarEditorMessage" class="form-message" aria-live="polite"></div>
        </article>

        <!-- ========================================
             EDITOR CARD
        ========================================= -->
        <article class="editor-card">
          <!-- Tabs -->
          <div class="avatar-tabs">
            <button type="button" class="avatar-tab active" data-tab="skin">Skin</button>
            <button type="button" class="avatar-tab" data-tab="hair">Hair</button>
            <button type="button" class="avatar-tab" data-tab="eyes">Eyes</button>
            <button type="button" class="avatar-tab" data-tab="ear">Ear</button>
            <button type="button" class="avatar-tab" data-tab="nose">Nose</button>
            <button type="button" class="avatar-tab" data-tab="mouth">Mouth</button>
            <button type="button" class="avatar-tab" data-tab="shirt">Shirt</button>
          </div>

          <!-- ========================================
               SKIN PANEL
          ========================================= -->
          <div class="avatar-panel active" data-panel="skin">
            <div class="option-group">
              <h3>Tom de pele</h3>
              <div class="choice-grid small-grid">
                <button type="button" class="choice-card active" data-avatar-field="skin" data-avatar-value="skin-1"><span>1</span></button>
                <button type="button" class="choice-card" data-avatar-field="skin" data-avatar-value="skin-2"><span>2</span></button>
                <button type="button" class="choice-card" data-avatar-field="skin" data-avatar-value="skin-3"><span>3</span></button>
                <button type="button" class="choice-card" data-avatar-field="skin" data-avatar-value="skin-4"><span>4</span></button>
                <button type="button" class="choice-card" data-avatar-field="skin" data-avatar-value="skin-5"><span>5</span></button>
                <button type="button" class="choice-card" data-avatar-field="skin" data-avatar-value="skin-6"><span>6</span></button>
              </div>
            </div>
          </div>

          <!-- ========================================
               HAIR PANEL
          ========================================= -->
          <div class="avatar-panel" data-panel="hair">
            <div class="option-group">
              <h3>Hair model</h3>
              <div class="choice-grid">
                <button type="button" class="choice-card active" data-avatar-field="hairModel" data-avatar-value="short"><span>Short</span></button>
                <button type="button" class="choice-card" data-avatar-field="hairModel" data-avatar-value="medium"><span>Medium</span></button>
                <button type="button" class="choice-card" data-avatar-field="hairModel" data-avatar-value="wavy"><span>Wavy</span></button>
                <button type="button" class="choice-card" data-avatar-field="hairModel" data-avatar-value="curly"><span>Curly</span></button>
                <button type="button" class="choice-card" data-avatar-field="hairModel" data-avatar-value="coily"><span>Coily</span></button>
                <button type="button" class="choice-card" data-avatar-field="hairModel" data-avatar-value="afro"><span>Afro</span></button>
                <button type="button" class="choice-card" data-avatar-field="hairModel" data-avatar-value="bun"><span>Bun</span></button>
              </div>
            </div>

            <div class="option-group">
              <h3>Hair color</h3>
              <div class="choice-grid">
                <button type="button" class="choice-card active" data-avatar-field="hairColor" data-avatar-value="dark"><span>Dark</span></button>
                <button type="button" class="choice-card" data-avatar-field="hairColor" data-avatar-value="brown"><span>Brown</span></button>
                <button type="button" class="choice-card" data-avatar-field="hairColor" data-avatar-value="light-brown"><span>Light brown</span></button>
                <button type="button" class="choice-card" data-avatar-field="hairColor" data-avatar-value="blonde"><span>Blonde</span></button>
                <button type="button" class="choice-card" data-avatar-field="hairColor" data-avatar-value="ginger"><span>Ginger</span></button>
              </div>
            </div>
          </div>

          <!-- ========================================
               EYES PANEL
          ========================================= -->
          <div class="avatar-panel" data-panel="eyes">
            <div class="option-group">
              <h3>Left eye</h3>
              <div class="choice-grid small-grid">
                <button type="button" class="choice-card active" data-avatar-field="eyeLeft" data-avatar-value="eye-1"><span>1</span></button>
                <button type="button" class="choice-card" data-avatar-field="eyeLeft" data-avatar-value="eye-2"><span>2</span></button>
                <button type="button" class="choice-card" data-avatar-field="eyeLeft" data-avatar-value="eye-3"><span>3</span></button>
                <button type="button" class="choice-card" data-avatar-field="eyeLeft" data-avatar-value="eye-4"><span>4</span></button>
              </div>
            </div>

            <div class="option-group">
              <h3>Right eye</h3>
              <div class="choice-grid small-grid">
                <button type="button" class="choice-card active" data-avatar-field="eyeRight" data-avatar-value="eye-1"><span>1</span></button>
                <button type="button" class="choice-card" data-avatar-field="eyeRight" data-avatar-value="eye-2"><span>2</span></button>
                <button type="button" class="choice-card" data-avatar-field="eyeRight" data-avatar-value="eye-3"><span>3</span></button>
                <button type="button" class="choice-card" data-avatar-field="eyeRight" data-avatar-value="eye-4"><span>4</span></button>
              </div>
            </div>
          </div>

          <!-- ========================================
               EAR PANEL
          ========================================= -->
          <div class="avatar-panel" data-panel="ear">
            <div class="option-group">
              <h3>Left ear</h3>
              <div class="choice-grid small-grid">
                <button type="button" class="choice-card active" data-avatar-field="earLeft" data-avatar-value="ear-1"><span>1</span></button>
                <button type="button" class="choice-card" data-avatar-field="earLeft" data-avatar-value="ear-2"><span>2</span></button>
                <button type="button" class="choice-card" data-avatar-field="earLeft" data-avatar-value="ear-3"><span>3</span></button>
                <button type="button" class="choice-card" data-avatar-field="earLeft" data-avatar-value="ear-4"><span>4</span></button>
              </div>
            </div>

            <div class="option-group">
              <h3>Right ear</h3>
              <div class="choice-grid small-grid">
                <button type="button" class="choice-card active" data-avatar-field="earRight" data-avatar-value="ear-1"><span>1</span></button>
                <button type="button" class="choice-card" data-avatar-field="earRight" data-avatar-value="ear-2"><span>2</span></button>
                <button type="button" class="choice-card" data-avatar-field="earRight" data-avatar-value="ear-3"><span>3</span></button>
                <button type="button" class="choice-card" data-avatar-field="earRight" data-avatar-value="ear-4"><span>4</span></button>
              </div>
            </div>
          </div>

          <!-- ========================================
               NOSE PANEL
          ========================================= -->
          <div class="avatar-panel" data-panel="nose">
            <div class="option-group">
              <h3>Nose</h3>
              <div class="choice-grid small-grid">
                <button type="button" class="choice-card active" data-avatar-field="nose" data-avatar-value="nose-1"><span>1</span></button>
                <button type="button" class="choice-card" data-avatar-field="nose" data-avatar-value="nose-2"><span>2</span></button>
                <button type="button" class="choice-card" data-avatar-field="nose" data-avatar-value="nose-3"><span>3</span></button>
                <button type="button" class="choice-card" data-avatar-field="nose" data-avatar-value="nose-4"><span>4</span></button>
              </div>
            </div>
          </div>

          <!-- ========================================
               MOUTH PANEL
          ========================================= -->
          <div class="avatar-panel" data-panel="mouth">
            <div class="option-group">
              <h3>Mouth</h3>
              <div class="choice-grid small-grid">
                <button type="button" class="choice-card active" data-avatar-field="mouth" data-avatar-value="mouth-1"><span>1</span></button>
                <button type="button" class="choice-card" data-avatar-field="mouth" data-avatar-value="mouth-2"><span>2</span></button>
                <button type="button" class="choice-card" data-avatar-field="mouth" data-avatar-value="mouth-3"><span>3</span></button>
                <button type="button" class="choice-card" data-avatar-field="mouth" data-avatar-value="mouth-4"><span>4</span></button>
                <button type="button" class="choice-card" data-avatar-field="mouth" data-avatar-value="mouth-5"><span>5</span></button>
                <button type="button" class="choice-card" data-avatar-field="mouth" data-avatar-value="mouth-6"><span>6</span></button>
              </div>
            </div>
          </div>

          <!-- ========================================
               SHIRT PANEL
          ========================================= -->
          <div class="avatar-panel" data-panel="shirt">
            <div class="option-group">
              <h3>Shirt model</h3>
              <div class="choice-grid">
                <button type="button" class="choice-card active" data-avatar-field="shirtModel" data-avatar-value="basic"><span>Basic</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtModel" data-avatar-value="t-shirt"><span>T-shirt</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtModel" data-avatar-value="hoodie"><span>Hoodie</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtModel" data-avatar-value="tank"><span>Tank</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtModel" data-avatar-value="sweater"><span>Sweater</span></button>
              </div>
            </div>

            <div class="option-group">
              <h3>Shirt color</h3>
              <div class="choice-grid">
                <button type="button" class="choice-card active" data-avatar-field="shirtColor" data-avatar-value="beige"><span>Beige</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtColor" data-avatar-value="brown"><span>Brown</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtColor" data-avatar-value="black"><span>Black</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtColor" data-avatar-value="white"><span>White</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtColor" data-avatar-value="gray"><span>Gray</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtColor" data-avatar-value="green"><span>Green</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtColor" data-avatar-value="blue"><span>Blue</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtColor" data-avatar-value="pink"><span>Pink</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtColor" data-avatar-value="lavender"><span>Lavender</span></button>
                <button type="button" class="choice-card" data-avatar-field="shirtColor" data-avatar-value="yellow"><span>Yellow</span></button>
              </div>
            </div>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="js/avatar-editor.js"></script>
</body>
</html>
