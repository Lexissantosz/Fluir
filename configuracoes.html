<!DOCTYPE html>
<html lang="pt-BR" data-theme="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluir | Configurações</title>

  <link rel="stylesheet" href="./assets/css/global.css" />
<link rel="stylesheet" href="./assets/css/components.css" />
<link rel="stylesheet" href="./assets/css/dashboard.css" />
<link rel="stylesheet" href="./assets/css/configuracoes.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <span class="dot dot-left"></span>
          <span class="curve"></span>
          <span class="dot dot-right"></span>
        </div>
        <h1>Fluir</h1>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">Início</a>
<a href="meu-dia.html" class="nav-item">Meu dia</a>
<a href="tarefas.html" class="nav-item">Tarefas</a>
<a href="planejamento.html" class="nav-item">Planejamento</a>
<a href="historico.html" class="nav-item">Histórico</a>
<a href="configuracoes.html" class="nav-item">Configurações</a>
      </nav>

      <div class="sidebar-user">
        <div>
          <strong id="sidebarUserName">Usuário</strong>
          <span>Conta ativa</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h2>Configurações</h2>
          <p>Personalize seu espaço e adapte o Fluir ao seu ritmo.</p>
        </div>

        <button id="logoutBtn" class="btn-outline">Sair</button>
      </header>

      <section class="settings-grid">
        <div class="settings-column">
          <div class="card">
            <div class="card-header">
              <h3>Perfil</h3>
            </div>

            <form id="profileForm" class="settings-form">
              <div class="profile-preview">
                <img
                  id="profileAvatarPreview"
                  src="https://via.placeholder.com/120x120.png?text=Fluir"
                  alt="Foto de perfil"
                />
              </div>

              <div class="field-block">
                <label for="profileName">Nome</label>
                <input type="text" id="profileName" placeholder="Seu nome" required />
              </div>

              <div class="field-block">
                <label for="profileEmail">E-mail</label>
                <input type="email" id="profileEmail" placeholder="seuemail@exemplo.com" required />
              </div>

              <div class="field-block">
                <label for="profilePhoto">URL da foto</label>
                <input type="url" id="profilePhoto" placeholder="https://..." />
              </div>

              <div class="form-actions">
                <button type="submit" class="btn-primary">Salvar perfil</button>
              </div>

              <p id="profileMessage" class="form-message"></p>
            </form>
          </div>

          <div class="card">
            <div class="card-header">
              <h3>Preferências do dia</h3>
            </div>

            <form id="preferencesForm" class="settings-form">
              <div class="field-block">
                <label for="defaultEnergy">Energia padrão</label>
                <select id="defaultEnergy">
                  <option value="baixa">Baixa</option>
                  <option value="media">Média</option>
                  <option value="alta">Alta</option>
                </select>
              </div>

              <div class="field-block">
                <label for="defaultTime">Tempo padrão disponível</label>
                <select id="defaultTime">
                  <option value="15">15 min</option>
                  <option value="30">30 min</option>
                  <option value="60">1h</option>
                  <option value="120">2h</option>
                </select>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn-primary">Salvar preferências</button>
              </div>

              <p id="preferencesMessage" class="form-message"></p>
            </form>
          </div>
        </div>

        <div class="settings-column">
          <div class="card">
            <div class="card-header">
              <h3>Temas</h3>
            </div>

            <div class="themes-grid">
              <button class="theme-card" data-theme="claro">
                <span class="theme-preview theme-light"></span>
                <strong>Claro</strong>
                <small>Leve e limpo</small>
              </button>

              <button class="theme-card" data-theme="escuro">
                <span class="theme-preview theme-dark"></span>
                <strong>Escuro</strong>
                <small>Mais profundo</small>
              </button>

              <button class="theme-card" data-theme="sepia">
                <span class="theme-preview theme-sepia"></span>
                <strong>Sépia</strong>
                <small>Quente e suave</small>
              </button>
            </div>

            <p id="themeMessage" class="form-message"></p>
          </div>

          <div class="card">
            <div class="card-header">
              <h3>Resumo da conta</h3>
            </div>

            <div class="account-summary">
              <div class="summary-row">
                <span>Nome</span>
                <strong id="summaryName">-</strong>
              </div>

              <div class="summary-row">
                <span>E-mail</span>
                <strong id="summaryEmail">-</strong>
              </div>

              <div class="summary-row">
                <span>Tema atual</span>
                <strong id="summaryTheme">Claro</strong>
              </div>

              <div class="summary-row">
                <span>Energia padrão</span>
                <strong id="summaryEnergy">Média</strong>
              </div>

              <div class="summary-row">
                <span>Tempo padrão</span>
                <strong id="summaryTime">1h</strong>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./assets/js/core/storage.js"></script>
<script src="./assets/js/core/session.js"></script>
<script src="./assets/js/core/auth-guard.js"></script>
<script src="./assets/js/core/theme.js"></script>
<script src="./assets/js/core/utils.js"></script>

<script src="./assets/js/services/user.service.js"></script>
<script src="./assets/js/services/task.service.js"></script>
<script src="./assets/js/services/preferences.service.js"></script>

<script src="./assets/js/ui/toast.js"></script>
<script src="./assets/js/app-init.js"></script>
<script src="./assets/js/pages/configuracoes.js"></script>
</body>
</html>
