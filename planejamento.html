<!DOCTYPE html>
<html lang="pt-BR" data-theme="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluir | Planejamento</title>

<link rel="stylesheet" href="./assets/css/global.css" />
<link rel="stylesheet" href="./assets/css/components.css" />
<link rel="stylesheet" href="./assets/css/dashboard.css" />
<link rel="stylesheet" href="./assets/css/tarefas.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <span class="dot dot-left"></span>
          <span class="curve"></span>
          <span class="dot dot-right"></span>
        </div>
        <h1>Fluir</h1>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">Início</a>
<a href="meu-dia.html" class="nav-item">Meu dia</a>
<a href="tarefas.html" class="nav-item">Tarefas</a>
<a href="planejamento.html" class="nav-item">Planejamento</a>
<a href="historico.html" class="nav-item">Histórico</a>
<a href="configuracoes.html" class="nav-item">Configurações</a>
      </nav>

      <div class="sidebar-user">
        <div>
          <strong id="sidebarUserName">Usuário</strong>
          <span>Conta ativa</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h2>Planejamento do dia</h2>
          <p>Distribua suas tarefas entre manhã, tarde e noite com leveza.</p>
        </div>

        <button id="logoutBtn" class="btn-outline">Sair</button>
      </header>

      <section class="planning-page">
        <div class="card">
          <div class="card-header">
            <h3>Tarefas não planejadas</h3>
            <span id="unplannedCounter" class="badge badge-energy">0 tarefas</span>
          </div>

          <div id="unplannedTasks" class="unplanned-list"></div>
        </div>

        <div class="planning-grid">
          <div class="card period-card">
            <div class="card-header">
              <h3>Manhã</h3>
              <span class="task-tag">06h - 12h</span>
            </div>
            <div id="manhaList" class="period-list"></div>
          </div>

          <div class="card period-card">
            <div class="card-header">
              <h3>Tarde</h3>
              <span class="task-tag">12h - 18h</span>
            </div>
            <div id="tardeList" class="period-list"></div>
          </div>

          <div class="card period-card">
            <div class="card-header">
              <h3>Noite</h3>
              <span class="task-tag">18h - 23h</span>
            </div>
            <div id="noiteList" class="period-list"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

<script src="./assets/js/core/storage.js"></script>
<script src="./assets/js/core/session.js"></script>
<script src="./assets/js/core/auth-guard.js"></script>
<script src="./assets/js/core/theme.js"></script>
<script src="./assets/js/core/utils.js"></script>

<script src="./assets/js/services/user.service.js"></script>
<script src="./assets/js/services/task.service.js"></script>
<script src="./assets/js/services/preferences.service.js"></script>

<script src="./assets/js/ui/toast.js"></script>
<script src="./assets/js/app-init.js"></script>
<script src="./assets/js/pages/tarefas.js"></script>
</body>
</html>
